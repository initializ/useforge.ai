<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16">
  <defs>
    <linearGradient id="fav_forgeOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A56"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#D94F00"/>
    </linearGradient>
    <linearGradient id="fav_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#fav_bgGrad)"/>

  <!-- Simplified F monogram - no filters/glows for favicon clarity -->
  <g transform="translate(256, 256)">
    <!-- Vertical stroke of F -->
    <rect x="-88" y="-130" width="42" height="260" rx="4" fill="url(#fav_forgeOrange)"/>

    <!-- Top horizontal bar of F -->
    <path d="M-88,-130 L88,-130 L88,-92 L-46,-92 Z" fill="url(#fav_forgeOrange)"/>
    <!-- Horn extension -->
    <path d="M88,-130 L120,-111 L88,-92 Z" fill="#D94F00" opacity="0.8"/>

    <!-- Middle horizontal bar of F -->
    <rect x="-46" y="-20" width="120" height="38" rx="4" fill="url(#fav_forgeOrange)"/>

    <!-- Anvil base -->
    <path d="M-100,118 L-46,118 L-46,130 L-88,130 Z" fill="url(#fav_forgeOrange)"/>
    <path d="M-46,118 L-46,130 L-30,130 Z" fill="#D94F00" opacity="0.6"/>

    <!-- Simplified sparks - just 2 dots for small size clarity -->
    <circle cx="105" cy="-140" r="8" fill="#FFF7ED"/>
    <circle cx="130" cy="-120" r="6" fill="#FDBA74"/>
  </g>

</svg>