<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="i_fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#D94F00"/>
    </linearGradient>
    <linearGradient id="i_st" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D3748"/>
      <stop offset="100%" stop-color="#1A202C"/>
    </linearGradient>
    <radialGradient id="i_sg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF7ED" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FDBA74" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="i_ds" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="i_sf" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feColorMatrix in="b" type="matrix" values="1 0.8 0.4 0 0  0.8 0.5 0.2 0 0  0.4 0.2 0 0 0  0 0 0 1 0" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Anvil -->
  <g filter="url(#i_ds)" transform="translate(128, 145)">
    <path d="M-60,15 L-34,-5 L-30,5 L-52,22 Z" fill="url(#i_st)"/>
    <path d="M-34,-5 L34,-5 L40,5 L-30,5 Z" fill="#374151"/>
    <path d="M-34,-5 L34,-5 L31,-2 L-31,-2 Z" fill="#4B5563" opacity="0.7"/>
    <path d="M-30,5 L40,5 L35,28 L-25,28 Z" fill="url(#i_st)"/>
    <path d="M-35,28 L45,28 L50,40 L-40,40 Z" fill="#1A202C"/>
    <path d="M-40,40 L50,40 L48,48 L-38,48 Z" fill="#111827"/>
  </g>

  <!-- Hammer -->
  <g filter="url(#i_ds)" transform="translate(128, 145)">
    <g transform="rotate(-35, 5, -30)">
      <rect x="3" y="-70" width="4" height="45" rx="2" fill="#78716C"/>
      <rect x="-7" y="-75" width="24" height="11" rx="2" fill="url(#i_fg)"/>
      <rect x="-6" y="-74" width="22" height="2" rx="1" fill="#FFB380" opacity="0.5"/>
    </g>
  </g>

  <!-- Sparks -->
  <g transform="translate(128, 145)" filter="url(#i_sf)">
    <circle cx="-8" cy="-9" r="2" fill="#FFF7ED"/>
    <circle cx="12" cy="-15" r="1.5" fill="#FDBA74"/>
    <circle cx="-15" cy="-18" r="1.2" fill="#FFD4A8"/>
    <circle cx="20" cy="-8" r="1" fill="#FFF7ED"/>
    <circle cx="3" cy="-22" r="1.3" fill="#FDBA74"/>
    <line x1="-10" y1="-11" x2="-18" y2="-20" stroke="#FDBA74" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
    <line x1="15" y1="-12" x2="25" y2="-20" stroke="#FFD4A8" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Strike glow -->
  <ellipse cx="123" cy="139" rx="10" ry="6" fill="url(#i_sg)" opacity="0.8"/>
</svg>