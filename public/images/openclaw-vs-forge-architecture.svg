<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>OpenClaw vs Forge Architecture Comparison</title>
  <desc>A split-panel diagram comparing OpenClaw's inbound gateway architecture with Forge's outbound-only networking model for enterprise AI agent deployment.</desc>

  <defs>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F97316" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0F1A"/>

  <!-- Left panel: OpenClaw -->
  <rect x="0" y="0" width="590" height="630" fill="#0B0F1A"/>

  <!-- Left panel header -->
  <text x="295" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#E5E7EB">OpenClaw Architecture</text>
  <text x="295" y="82" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9CA3AF">Inbound Gateway Model</text>

  <!-- Internet cloud -->
  <rect x="100" y="110" width="390" height="50" rx="8" fill="#1E293B" stroke="#374151" stroke-width="1.5"/>
  <text x="295" y="141" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#9CA3AF">Internet / External Services</text>

  <!-- Inbound arrows (red - security risk) -->
  <line x1="200" y1="160" x2="200" y2="200" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="295" y1="160" x2="295" y2="200" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="390" y1="160" x2="390" y2="200" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>

  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Exposed ports label -->
  <rect x="130" y="175" width="330" height="24" rx="4" fill="#EF4444" fill-opacity="0.1"/>
  <text x="295" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#EF4444">INBOUND CONNECTIONS REQUIRED</text>

  <!-- Gateway box -->
  <rect x="130" y="210" width="330" height="60" rx="10" fill="#1E293B" stroke="#EF4444" stroke-width="2" stroke-opacity="0.6"/>
  <text x="295" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#E5E7EB">Gateway Process</text>
  <text x="295" y="257" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9CA3AF">ws://127.0.0.1:18789</text>

  <!-- Tunnel/port exposure -->
  <rect x="55" y="225" width="60" height="30" rx="6" fill="#7F1D1D" stroke="#EF4444" stroke-width="1"/>
  <text x="85" y="244" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#FCA5A5">ngrok</text>
  <line x1="115" y1="240" x2="130" y2="240" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="475" y="225" width="60" height="30" rx="6" fill="#7F1D1D" stroke="#EF4444" stroke-width="1"/>
  <text x="505" y="244" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#FCA5A5">SSH</text>
  <line x1="460" y1="240" x2="475" y2="240" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Connection lines down -->
  <line x1="295" y1="270" x2="295" y2="300" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Agent runtime -->
  <rect x="160" y="300" width="270" height="50" rx="10" fill="#1E293B" stroke="#374151" stroke-width="1.5"/>
  <text x="295" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#E5E7EB">Agent Runtime (No Sandbox)</text>

  <!-- Skills row -->
  <line x1="220" y1="350" x2="220" y2="380" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="295" y1="350" x2="295" y2="380" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="370" y1="350" x2="370" y2="380" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="175" y="385" width="80" height="35" rx="6" fill="#1E293B" stroke="#374151" stroke-width="1"/>
  <text x="215" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF">Skill A</text>

  <rect x="260" y="385" width="80" height="35" rx="6" fill="#1E293B" stroke="#374151" stroke-width="1"/>
  <text x="300" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF">Skill B</text>

  <rect x="345" y="385" width="80" height="35" rx="6" fill="#1E293B" stroke="#374151" stroke-width="1"/>
  <text x="385" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF">Skill C</text>

  <!-- Security gaps list -->
  <g transform="translate(100, 445)">
    <circle cx="10" cy="10" r="5" fill="#EF4444"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FCA5A5">Exposed inbound ports</text>
  </g>
  <g transform="translate(100, 472)">
    <circle cx="10" cy="10" r="5" fill="#EF4444"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FCA5A5">No egress control</text>
  </g>
  <g transform="translate(100, 499)">
    <circle cx="10" cy="10" r="5" fill="#EF4444"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FCA5A5">No runtime sandboxing</text>
  </g>
  <g transform="translate(100, 526)">
    <circle cx="10" cy="10" r="5" fill="#EF4444"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FCA5A5">No build signing or trust pipeline</text>
  </g>
  <g transform="translate(100, 553)">
    <circle cx="10" cy="10" r="5" fill="#EF4444"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FCA5A5">No structured audit logging</text>
  </g>

  <!-- Divider -->
  <rect x="594" y="0" width="3" height="630" fill="url(#divider)"/>

  <!-- Right panel: Forge -->
  <rect x="600" y="0" width="600" height="630" fill="#0B0F1A"/>

  <!-- Right panel header -->
  <text x="900" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#E5E7EB">Forge Architecture</text>
  <text x="900" y="82" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9CA3AF">Outbound-Only Model</text>

  <!-- Internet cloud -->
  <rect x="710" y="110" width="390" height="50" rx="8" fill="#1E293B" stroke="#374151" stroke-width="1.5"/>
  <text x="905" y="141" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#9CA3AF">Internet / External Services</text>

  <!-- Outbound-only label -->
  <rect x="740" y="175" width="330" height="24" rx="4" fill="#22C55E" fill-opacity="0.1"/>
  <text x="905" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#22C55E">OUTBOUND-ONLY — NO EXPOSED PORTS</text>

  <!-- Outbound arrows (green - going UP from agent) -->
  <line x1="810" y1="200" x2="810" y2="160" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="905" y1="200" x2="905" y2="160" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="1000" y1="200" x2="1000" y2="160" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Egress enforcement -->
  <rect x="740" y="210" width="330" height="60" rx="10" fill="#1E293B" stroke="#22C55E" stroke-width="2" stroke-opacity="0.6"/>
  <text x="905" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#E5E7EB">Egress Enforcement Layer</text>
  <text x="905" y="257" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9CA3AF">Per-skill domain allowlists</text>

  <!-- Shield icons -->
  <rect x="665" y="225" width="60" height="30" rx="6" fill="#052E16" stroke="#22C55E" stroke-width="1"/>
  <text x="695" y="244" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#86EFAC">Signed</text>
  <line x1="725" y1="240" x2="740" y2="240" stroke="#22C55E" stroke-width="1.5"/>

  <rect x="1085" y="225" width="60" height="30" rx="6" fill="#052E16" stroke="#22C55E" stroke-width="1"/>
  <text x="1115" y="244" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#86EFAC">Audit</text>
  <line x1="1070" y1="240" x2="1085" y2="240" stroke="#22C55E" stroke-width="1.5"/>

  <!-- Connection lines down -->
  <line x1="905" y1="270" x2="905" y2="300" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Agent runtime -->
  <rect x="770" y="300" width="270" height="50" rx="10" fill="#1E293B" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="905" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#E5E7EB">Sandboxed Agent Runtime</text>

  <!-- Skills row -->
  <line x1="830" y1="350" x2="830" y2="380" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="905" y1="350" x2="905" y2="380" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="980" y1="350" x2="980" y2="380" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="785" y="385" width="80" height="35" rx="6" fill="#1E293B" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <text x="825" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#86EFAC">SKILL.md</text>

  <rect x="870" y="385" width="80" height="35" rx="6" fill="#1E293B" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <text x="910" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#86EFAC">SKILL.md</text>

  <rect x="955" y="385" width="80" height="35" rx="6" fill="#1E293B" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <text x="995" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#86EFAC">SKILL.md</text>

  <!-- Trust pipeline -->
  <rect x="740" y="440" width="330" height="40" rx="8" fill="#052E16" stroke="#22C55E" stroke-width="1" stroke-opacity="0.4"/>
  <text x="905" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#86EFAC">Trust Pipeline: Scan &#8594; Parse &#8594; Analyze &#8594; Evaluate</text>

  <!-- Security features list -->
  <g transform="translate(710, 500)">
    <circle cx="10" cy="10" r="5" fill="#22C55E"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#86EFAC">No inbound ports or tunnels</text>
  </g>
  <g transform="translate(710, 524)">
    <circle cx="10" cy="10" r="5" fill="#22C55E"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#86EFAC">Per-skill egress allowlists</text>
  </g>
  <g transform="translate(710, 548)">
    <circle cx="10" cy="10" r="5" fill="#22C55E"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#86EFAC">Runtime sandboxing with resource limits</text>
  </g>
  <g transform="translate(710, 572)">
    <circle cx="10" cy="10" r="5" fill="#22C55E"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#86EFAC">Cryptographic build signing</text>
  </g>
  <g transform="translate(710, 596)">
    <circle cx="10" cy="10" r="5" fill="#22C55E"/>
    <text x="22" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#86EFAC">Structured audit logging with correlation IDs</text>
  </g>

  <!-- Footer branding -->
  <text x="295" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280">openclaw.com</text>
  <text x="905" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#F97316">useforge.ai</text>
</svg>
